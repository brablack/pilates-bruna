<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Assinar Contrato</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        canvas {
            border: 2px solid #000;
            width: 100%;
            height: 250px;
            background: white;
            touch-action: none;
        }
    </style>
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card p-4">
        <h2 class="mb-3">Assinatura Digital</h2>

        <p>Assine abaixo usando o mouse ou o dedo no celular.</p>

        <form action="/salvar_assinatura/{{ aluno_id }}"
              method="POST"
              target="_blank"
              onsubmit="salvarAssinatura()">

            <canvas id="canvas"></canvas>

            <input type="hidden" name="assinatura" id="assinatura">

            <div class="mt-3">
                <button type="button" class="btn btn-warning" onclick="limparAssinatura()">Limpar</button>
                <button type="submit" class="btn btn-success">Salvar Assinatura</button>
                <a href="/alunos" class="btn btn-secondary">Voltar</a>
            </div>

        </form>
    </div>

</div>

<script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    function ajustarCanvas() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = 250;
        ctx.lineWidth = 2;
        ctx.lineCap = "round";
    }

    ajustarCanvas();

    let desenhando = false;

    function posicao(evento) {
        const rect = canvas.getBoundingClientRect();

        if (evento.touches && evento.touches.length > 0) {
            return {
                x: evento.touches[0].clientX - rect.left,
                y: evento.touches[0].clientY - rect.top
            };
        }

        return {
            x: evento.clientX - rect.left,
            y: evento.clientY - rect.top
        };
    }

    function iniciar(evento) {
        desenhando = true;
        const p = posicao(evento);
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        evento.preventDefault();
    }

    function desenhar(evento) {
        if (!desenhando) return;
        const p = posicao(evento);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
        evento.preventDefault();
    }

    function parar() {
        desenhando = false;
    }

    canvas.addEventListener("mousedown", iniciar);
    canvas.addEventListener("mousemove", desenhar);
    canvas.addEventListener("mouseup", parar);
    canvas.addEventListener("mouseleave", parar);

    canvas.addEventListener("touchstart", iniciar);
    canvas.addEventListener("touchmove", desenhar);
    canvas.addEventListener("touchend", parar);

    function limparAssinatura() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function salvarAssinatura() {
        document.getElementById("assinatura").value = canvas.toDataURL("image/png");
    }
</script>

</body>
</html>
