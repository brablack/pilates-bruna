<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Aluno</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="mb-4">Editar Cadastro do Aluno</h1>

    <form action="/atualizar_aluno/{{ aluno[0] }}" method="POST" class="card p-4">

        <h5 class="mb-3">Dados do Aluno</h5>

        <div class="mb-3">
            <label class="form-label">Nome</label>
            <input type="text" name="nome" class="form-control" value="{{ aluno[1] }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Endereço</label>
            <input type="text" name="endereco" class="form-control" value="{{ aluno[2] or '' }}">
        </div>

        <div class="mb-3">
            <label class="form-label">Telefone</label>
            <input type="text" name="telefone" class="form-control" value="{{ aluno[3] or '' }}">
        </div>

        <div class="mb-3">
            <label class="form-label">E-mail</label>
            <input type="email" name="email" class="form-control" value="{{ aluno[4] or '' }}">
        </div>

        <div class="mb-3">
            <label class="form-label">Data de Nascimento</label>
            <input type="date" name="data_nascimento" class="form-control" value="{{ aluno[5] or '' }}">
        </div>

        <div class="mb-3">
            <label class="form-label">Observações</label>
            <textarea name="observacoes" class="form-control">{{ aluno[6] or '' }}</textarea>
        </div>

        <hr>

        <h5 class="mb-3">Dados do Contrato e Plano</h5>

        <div class="mb-3">
            <label class="form-label">Tipo de Plano</label>
            <input type="text" name="tipo_plano" class="form-control" value="{{ aluno[7] or '' }}">
        </div>

        <div class="mb-3">
            <label class="form-label">Número de Aulas por Semana</label>
            <input type="text" name="aulas_semana" class="form-control" value="{{ aluno[8] or '' }}">
        </div>

        <div class="mb-3">
            <label class="form-label">Dias e Horários</label>
            <input type="text" name="dias_horarios" class="form-control" value="{{ aluno[9] or '' }}">
        </div>

        <div class="mb-3">
            <label class="form-label">Valor Mensal</label>
            <input type="number" step="0.01" name="valor_mensal" class="form-control" value="{{ aluno[10] or '' }}">
        </div>

        <div class="mb-3">
            <label class="form-label">Dia do Vencimento</label>
            <input type="number" name="dia_vencimento" class="form-control" min="1" max="31" value="{{ aluno[11] or '' }}">
        </div>

        <div class="mb-3">
            <label class="form-label">Data de Início</label>
            <input type="date" name="data_inicio" class="form-control" value="{{ aluno[12] or '' }}">
        </div>

        <button type="submit" class="btn btn-primary">Salvar Alterações</button>
        <a href="/alunos" class="btn btn-secondary mt-2">Cancelar</a>

    </form>

</div>

</body>
</html>
